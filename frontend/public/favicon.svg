<svg width="64" height="64" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="docGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGradient)"/>

  <!-- Code brackets - left -->
  <path
    d="M 30 25 L 18 40 L 18 60 L 30 75"
    fill="none"
    stroke="#ffffff"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Code brackets - right -->
  <path
    d="M 70 25 L 82 40 L 82 60 L 70 75"
    fill="none"
    stroke="#ffffff"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Document icon in center -->
  <rect
    x="40"
    y="32"
    width="20"
    height="28"
    rx="2"
    fill="url(#docGradient)"
  />

  <!-- Document lines -->
  <line x1="43" y1="38" x2="57" y2="38" stroke="#1e293b" stroke-width="2" stroke-linecap="round" />
  <line x1="43" y1="44" x2="57" y2="44" stroke="#1e293b" stroke-width="2" stroke-linecap="round" />
  <line x1="43" y1="50" x2="54" y2="50" stroke="#1e293b" stroke-width="2" stroke-linecap="round" />

  <!-- AI sparkle -->
  <circle cx="58" cy="34" r="3" fill="#fbbf24"/>
</svg>
